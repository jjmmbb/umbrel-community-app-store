services:
  app_proxy:
    environment:
      APP_HOST: community-zoraxy_server_1
      APP_PORT: 8000
      PROXY_AUTH_ADD: "false"
  server:
    image: zoraxydocker/zoraxy:3.3.1@sha256:1b986b69d2c719a216169e7abcd03c7061a881383b95a7ac3f0be6106d1ac83b
    restart: on-failure
    ports:
      - 42080:80
      - 42443:443
    volumes:
      - ${APP_DATA_DIR}/config/:/opt/zoraxy/config/
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    environment:
      FASTGEOIP: "false"
      ZEROTIER: "true"

