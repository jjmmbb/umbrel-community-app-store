services:
  app_proxy:
    environment:
      APP_HOST: community-zoraxy_server_1
      APP_PORT: 8000
      PROXY_AUTH_ADD: "false"
  server:
    image: zoraxydocker/zoraxy:3.2.7@sha256:6f5b50d65e99f660a68a6f18d1bea1ac26f2827fa28d2bc3dc6c7019bc4b6b72
    restart: on-failure
    ports:
      - 42080:80
      - 42443:443
    volumes:
      - ${APP_DATA_DIR}/config/:/opt/zoraxy/config/
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    environment:
      FASTGEOIP: "false"
      ZEROTIER: "true"
